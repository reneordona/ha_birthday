<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthdays This Month</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --main: #05c3de;
    --secondary: #236092;
    --text: #FFFFFF;
    --pink: #ff6ec7;
    --yellow: #ffd93d;
    --coral: #ff8e6b;
    --mint: #6bffb8;
    --purple: #b892ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(135deg, #236092 0%, #1a4a75 50%, #2d7bb8 100%);
    color: var(--text);
    font-family: 'Quicksand', sans-serif;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 50px 70px;
  }

  .confetti {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 14px;
    opacity: 0.85;
    z-index: 1;
    animation: fall linear infinite;
    pointer-events: none;
  }

  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(720deg); }
  }

  .balloon {
    position: fixed;
    bottom: -200px;
    width: 60px;
    height: 75px;
    border-radius: 50%;
    z-index: 1;
    animation: float-up linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }

  .balloon::before {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 10px solid currentColor;
    opacity: 0.85;
  }

  .balloon::after {
    content: '';
    position: absolute;
    bottom: -120px;
    left: 50%;
    width: 1px;
    height: 120px;
    background: rgba(255,255,255,0.4);
  }

  @keyframes float-up {
    0% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-50vh) translateX(20px); }
    100% { transform: translateY(-110vh) translateX(-10px); }
  }

  body::before {
    content: '';
    position: absolute;
    top: -150px;
    right: -150px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,110,199,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,217,61,0.2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeSlide 0.8s ease-out 0.2s forwards;
  }

  .header-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--main);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-label .emoji {
    font-size: 1.4rem;
    animation: wiggle 2s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }

  .month-display {
    text-align: right;
    font-family: 'Pacifico', cursive;
    font-size: 2rem;
    color: var(--yellow);
    text-shadow: 0 2px 20px rgba(255,217,61,0.4);
    line-height: 1;
  }

  .month-display .year {
    display: block;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    margin-top: 6px;
  }

  main {
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }

  .today-section {
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeSlide 0.8s ease-out 0.4s forwards;
  }

  .today-banner {
    background: linear-gradient(135deg, #ff6ec7 0%, #ffd93d 50%, #ff8e6b 100%);
    border-radius: 24px;
    padding: 28px 40px;
    position: relative;
    box-shadow:
      0 10px 40px rgba(255,110,199,0.4),
      0 0 0 4px rgba(255,255,255,0.1),
      inset 0 2px 0 rgba(255,255,255,0.3);
    overflow: hidden;
  }

  .today-banner::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 40%);
    animation: shimmer 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes shimmer {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(25%, 25%); }
  }

  .today-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
    position: relative;
    z-index: 1;
  }

  .cake-icon {
    font-size: 3rem;
    animation: bounce 1.5s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.05); }
  }

  .today-title {
    font-family: 'Pacifico', cursive;
    font-size: 3rem;
    color: #fff;
    text-shadow: 0 3px 12px rgba(0,0,0,0.25);
    line-height: 1;
  }

  .today-names {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  .today-name {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 14px 28px;
    font-family: 'Fredoka', sans-serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--secondary);
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    transform: rotate(-1deg);
  }

  .today-name:nth-child(even) { transform: rotate(1deg); }
  .today-name:nth-child(3n) { transform: rotate(-2deg); }

  .no-today-banner {
    background: rgba(255,255,255,0.08);
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 24px;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .no-today-banner .icon { font-size: 2.2rem; opacity: 0.8; }

  .no-today-banner .text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4rem;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  .month-section {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeSlide 0.8s ease-out 0.6s forwards;
  }

  .month-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .month-header .emoji { font-size: 1.6rem; }

  .month-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--mint);
    letter-spacing: 0.05em;
  }

  .month-header .divider {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, rgba(107,255,184,0.5), transparent);
    border-radius: 2px;
  }

  .month-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px 24px;
    overflow: hidden;
  }

  .month-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    animation: popIn 0.5s ease-out both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .month-item.past { opacity: 0.4; }

  .month-item-date {
    background: linear-gradient(135deg, var(--main), var(--purple));
    min-width: 54px;
    height: 54px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: #fff;
    box-shadow: 0 4px 12px rgba(5,195,222,0.3);
    flex-shrink: 0;
  }

  .month-item.past .month-item-date {
    background: linear-gradient(135deg, #556, #667);
    box-shadow: none;
  }

  .month-item-name {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--text);
  }

  .month-item-emoji {
    margin-left: auto;
    font-size: 1.4rem;
    opacity: 0.9;
  }

  .no-birthdays {
    font-family: 'Pacifico', cursive;
    font-size: 1.6rem;
    color: var(--yellow);
    text-align: center;
    padding: 60px 0;
  }

  .state-message {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Pacifico', cursive;
    font-size: 1.8rem;
    color: rgba(255,255,255,0.8);
    text-align: center;
    padding: 40px;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 900px) {
    body { padding: 30px 30px; }
    .today-title { font-size: 2rem; }
    .today-name { font-size: 1.4rem; padding: 10px 20px; }
    .month-list { grid-template-columns: 1fr; }
    .month-display { font-size: 1.5rem; }
  }
</style>
</head>
<body>
  <header>
    <div class="header-label"><span class="emoji">🎉</span>LET'S CELEBRATE</div>
    <div class="month-display">
      <span id="month-label">Month</span>
      <span class="year" id="year-label">2026</span>
    </div>
  </header>

  <main id="main">
    <div class="state-message">Loading birthdays… 🎈</div>
  </main>

<script>
  // ============================================================
  // CONFIG — paste your published Google Sheet CSV URL below
  // ============================================================
  // 1. In Google Sheets: File → Share → Publish to web
  // 2. Choose the birthday sheet/tab
  // 3. Select "Comma-separated values (.csv)"
  // 4. Click Publish, then copy the URL
  // 5. Paste between the quotes below
  //
  // Expected columns (first row is headers):
  //   Name | Month | Day
  // ============================================================
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNYPnsghleG2vyJgNbePYiiXruEAy1m7d3Wco_UQiUpiVgPZgKxbDCOTjDjrrrw3D_HEQl8yd7Dxkh/pub?output=csv";
  const REFRESH_HOURS = 6;

  const CONFETTI_COLORS = ['#ff6ec7','#ffd93d','#ff8e6b','#6bffb8','#b892ff','#05c3de'];
  const BALLOON_COLORS = ['#ff6ec7','#ffd93d','#ff8e6b','#6bffb8','#b892ff','#05c3de'];
  const BIRTHDAY_EMOJIS = ['🎂','🎁','🎈','🎊','🥳','🧁','🍰','⭐','✨','🎀'];

  function makeConfetti(count = 40) {
    for (let i = 0; i < count; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      const color = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
      c.style.background = color;
      c.style.left = Math.random() * 100 + 'vw';
      c.style.animationDuration = (6 + Math.random() * 6) + 's';
      c.style.animationDelay = (Math.random() * 8) + 's';
      if (Math.random() > 0.5) c.style.borderRadius = '50%';
      if (Math.random() > 0.7) { c.style.width = '6px'; c.style.height = '16px'; }
      document.body.appendChild(c);
    }
  }

  function lighten(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const mix = (v) => Math.min(255, Math.round(v + (255-v)*0.5));
    return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
  }

  function makeBalloons(count = 6) {
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'balloon';
      const color = BALLOON_COLORS[i % BALLOON_COLORS.length];
      b.style.background = `radial-gradient(circle at 30% 30%, ${lighten(color)}, ${color})`;
      b.style.color = color;
      b.style.left = (10 + Math.random() * 80) + 'vw';
      b.style.animationDuration = (18 + Math.random() * 12) + 's';
      b.style.animationDelay = (Math.random() * 20) + 's';
      document.body.appendChild(b);
    }
  }

  makeConfetti();
  makeBalloons();

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else {
        if (c === '"') { inQuotes = true; }
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else if (c === '\r') { /* skip */ }
        else { field += c; }
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(cell => cell.trim() !== ''));
  }

  function parseMonth(value) {
    const v = String(value).trim();
    if (!v) return null;
    const n = parseInt(v, 10);
    if (!isNaN(n) && n >= 1 && n <= 12) return n;
    const lower = v.toLowerCase();
    for (let i = 0; i < MONTHS.length; i++) {
      if (MONTHS[i].toLowerCase().startsWith(lower.slice(0,3))) return i + 1;
    }
    return null;
  }

  async function loadBirthdays() {
    const today = new Date();
    const currentMonth = today.getMonth() + 1;
    const currentDay = today.getDate();
    const currentYear = today.getFullYear();

    document.getElementById('month-label').textContent = MONTHS[currentMonth - 1];
    document.getElementById('year-label').textContent = currentYear;

    if (!SHEET_CSV_URL || SHEET_CSV_URL.includes('PASTE_YOUR')) {
      renderError("Google Sheet not configured yet 🎈<br><br><span style='font-size:0.7em;opacity:0.7;font-family:Quicksand;'>Edit the HTML file and set SHEET_CSV_URL</span>");
      return;
    }

    try {
      // Try direct fetch first (works when file is hosted on SharePoint/Drive/etc.)
      // If that fails due to CORS (happens when opening file:// locally), fall back
      // to a public CORS proxy so you can preview the page on your own computer.
      let text;
      try {
        const res = await fetch(SHEET_CSV_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('Direct fetch failed: ' + res.status);
        text = await res.text();
      } catch (directErr) {
        console.warn('Direct fetch failed, trying CORS proxy fallback:', directErr);
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV_URL);
        const res = await fetch(proxyUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('Proxy fetch failed: ' + res.status);
        text = await res.text();
      }
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error('No data rows found');

      const header = rows[0].map(h => h.trim().toLowerCase());
      const nameIdx = header.findIndex(h => h.includes('name'));
      const monthIdx = header.findIndex(h => h.includes('month'));
      const dayIdx = header.findIndex(h => h.includes('day'));

      if (nameIdx === -1 || monthIdx === -1 || dayIdx === -1) {
        throw new Error('Required columns missing. Need: Name, Month, Day');
      }

      const entries = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const name = (r[nameIdx] || '').trim();
        const month = parseMonth(r[monthIdx]);
        const day = parseInt((r[dayIdx] || '').trim(), 10);
        if (!name || !month || isNaN(day) || day < 1 || day > 31) continue;
        if (month === currentMonth) {
          entries.push({ name, month, day });
        }
      }

      entries.sort((a, b) => a.day - b.day);
      renderBirthdays(entries, currentDay);
    } catch (err) {
      console.error(err);
      renderError("Couldn't load birthdays 🎈<br><br><span style='font-size:0.7em;opacity:0.7;font-family:Quicksand;'>Check that the Google Sheet is published as CSV</span>");
    }
  }

  function renderError(msg) {
    document.getElementById('main').innerHTML =
      `<div class="state-message">${msg}</div>`;
  }

  function renderBirthdays(entries, currentDay) {
    const today = entries.filter(e => e.day === currentDay);
    const rest = entries.filter(e => e.day !== currentDay);

    let html = '';

    html += `<section class="today-section">`;
    if (today.length > 0) {
      html += `<div class="today-banner">`;
      html += `<div class="today-header">`;
      html += `<span class="cake-icon">🎂</span>`;
      html += `<h1 class="today-title">Happy Birthday!</h1>`;
      html += `</div>`;
      html += `<div class="today-names">`;
      today.forEach(e => {
        html += `<div class="today-name">${escapeHtml(e.name)}</div>`;
      });
      html += `</div>`;
      html += `</div>`;
    } else {
      html += `<div class="no-today-banner">`;
      html += `<span class="icon">🎈</span>`;
      html += `<span class="text">No birthdays today — but plenty to celebrate this month!</span>`;
      html += `</div>`;
    }
    html += `</section>`;

    html += `<section class="month-section">`;
    html += `<div class="month-header">`;
    html += `<span class="emoji">🎁</span>`;
    html += `<span class="month-title">Coming Up This Month</span>`;
    html += `<span class="divider"></span>`;
    html += `</div>`;

    if (rest.length === 0 && today.length === 0) {
      html += `<div class="no-birthdays">No birthdays on the calendar this month ✨</div>`;
    } else if (rest.length === 0) {
      html += `<div class="no-birthdays">That's everyone this month! 🎉</div>`;
    } else {
      html += `<div class="month-list">`;
      rest.forEach((e, i) => {
        const past = e.day < currentDay;
        const emoji = BIRTHDAY_EMOJIS[i % BIRTHDAY_EMOJIS.length];
        html += `<div class="month-item ${past ? 'past' : ''}" style="animation-delay:${i * 0.05}s">`;
        html += `<span class="month-item-date">${e.day}</span>`;
        html += `<span class="month-item-name">${escapeHtml(e.name)}</span>`;
        html += `<span class="month-item-emoji">${emoji}</span>`;
        html += `</div>`;
      });
      html += `</div>`;
    }
    html += `</section>`;

    document.getElementById('main').innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  loadBirthdays();
  setInterval(loadBirthdays, REFRESH_HOURS * 60 * 60 * 1000);

  (function scheduleMidnightRefresh() {
    const now = new Date();
    const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 30);
    const ms = tomorrow - now;
    setTimeout(() => { location.reload(); }, ms);
  })();
</script>
</body>
</html>
